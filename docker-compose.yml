services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: transcript_chat_postgres
    environment:
      POSTGRES_USER: transcript
      POSTGRES_PASSWORD: transcript
      POSTGRES_DB: transcript_chat
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

